<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRESZ Gyakorló — AM Moped / Moped Theory Practice</title>
<style>
  :root {
    --paper: #EDEAE0;
    --paper-light: #F7F5EE;
    --ink: #1A1A1A;
    --sign-blue: #1B3A6B;
    --sign-blue-light: #2C4F86;
    --sign-red: #C8102E;
    --sign-amber: #F5C400;
    --line: #C9C4B4;
    --green: #1E7A3D;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
    min-height: 100vh;
  }

  @font-face {
    font-family: 'Sign';
    src: local('Arial Narrow Bold');
  }

  .app {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 18px 60px;
  }

  /* ===== HEADER ===== */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-badge {
    width: 46px;
    height: 46px;
    border-radius: 50%;
    background: var(--sign-red);
    border: 3px solid white;
    box-shadow: 0 0 0 2px var(--sign-red);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .brand h1 {
    font-size: 19px;
    margin: 0;
    letter-spacing: -0.2px;
    font-weight: 800;
    color: var(--sign-blue);
  }

  .brand p {
    margin: 2px 0 0;
    font-size: 12.5px;
    color: #5b5648;
    font-weight: 500;
  }

  /* lang toggle - looks like a physical switch */
  .lang-toggle {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--ink);
    border-radius: 999px;
    padding: 3px;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
  }

  .lang-toggle button {
    border: none;
    background: transparent;
    color: #aaa;
    font-weight: 700;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }

  .lang-toggle button.active {
    background: var(--sign-amber);
    color: var(--ink);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }

  /* ===== TOPIC FILTER CHIPS ===== */
  .topics {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .chip {
    border: 2px solid var(--ink);
    background: var(--paper-light);
    color: var(--ink);
    font-size: 12px;
    font-weight: 700;
    padding: 6px 13px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .chip.active {
    background: var(--sign-blue);
    color: white;
    border-color: var(--sign-blue);
  }

  /* ===== PROGRESS BAR ===== */
  .progress-wrap {
    margin-bottom: 18px;
  }

  .progress-track {
    height: 8px;
    background: var(--line);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 999px;
    transition: width 0.3s ease;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    color: #5b5648;
    margin-top: 6px;
  }

  /* ===== SIGN CARD (the question) ===== */
  .sign-card {
    background: var(--paper-light);
    border-radius: 18px;
    border: 3px solid var(--ink);
    box-shadow: 6px 6px 0 var(--ink);
    padding: 26px 24px;
    margin-bottom: 20px;
    position: relative;
  }

  .sign-card .topic-tab {
    position: absolute;
    top: -14px;
    left: 22px;
    background: var(--sign-amber);
    border: 2px solid var(--ink);
    border-radius: 6px;
    padding: 3px 10px;
    font-size: 10.5px;
    font-weight: 800;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }

  .q-counter {
    font-size: 12px;
    font-weight: 700;
    color: var(--sign-blue);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }

  .q-text {
    font-size: 18px;
    font-weight: 700;
    line-height: 1.4;
    margin: 0 0 20px;
    color: var(--ink);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    text-align: left;
    border: 2px solid var(--line);
    background: white;
    border-radius: 12px;
    padding: 13px 16px;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
  }

  .option-btn:hover:not(:disabled) {
    border-color: var(--sign-blue);
    background: #f0f4fa;
  }

  .option-letter {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--paper);
    border: 2px solid var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    flex-shrink: 0;
  }

  .option-btn.correct {
    border-color: var(--green);
    background: #e7f5ec;
  }
  .option-btn.correct .option-letter {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }

  .option-btn.wrong {
    border-color: var(--sign-red);
    background: #fbe9eb;
  }
  .option-btn.wrong .option-letter {
    background: var(--sign-red);
    border-color: var(--sign-red);
    color: white;
  }

  .option-btn:disabled {
    cursor: default;
  }

  .explain-box {
    margin-top: 18px;
    padding: 14px 16px;
    background: #fff8e1;
    border-left: 4px solid var(--sign-amber);
    border-radius: 8px;
    font-size: 14px;
    line-height: 1.5;
  }

  .explain-box strong {
    color: var(--sign-blue);
  }

  .next-btn {
    margin-top: 18px;
    width: 100%;
    background: var(--sign-blue);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s ease;
  }

  .next-btn:hover { background: var(--sign-blue-light); }

  /* ===== RESULTS SCREEN ===== */
  .results {
    text-align: center;
    padding: 30px 20px;
  }

  .score-ring {
    width: 160px;
    height: 160px;
    margin: 0 auto 20px;
    position: relative;
  }

  .score-ring svg { transform: rotate(-90deg); }

  .score-ring .score-text {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }

  .score-text .pts {
    font-size: 30px;
    font-weight: 800;
    color: var(--ink);
  }
  .score-text .of {
    font-size: 12px;
    font-weight: 600;
    color: #5b5648;
  }

  .pass-banner {
    display: inline-block;
    padding: 8px 22px;
    border-radius: 999px;
    font-weight: 800;
    font-size: 14px;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }
  .pass-banner.pass { background: #e7f5ec; color: var(--green); border: 2px solid var(--green); }
  .pass-banner.fail { background: #fbe9eb; color: var(--sign-red); border: 2px solid var(--sign-red); }

  .results h2 { margin: 14px 0 6px; font-size: 22px; color: var(--sign-blue); }
  .results p.sub { color: #5b5648; font-size: 14px; margin-bottom: 26px; }

  .restart-btn {
    background: var(--sign-amber);
    border: 2px solid var(--ink);
    color: var(--ink);
    font-weight: 700;
    font-size: 14px;
    padding: 12px 26px;
    border-radius: 999px;
    cursor: pointer;
    margin: 0 6px;
  }

  .restart-btn.outline {
    background: transparent;
  }

  /* ===== START SCREEN ===== */
  .start-screen {
    text-align: center;
    padding: 10px 8px 30px;
  }

  .start-screen .hero-signs {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-bottom: 22px;
  }

  .mini-sign {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    border: 4px solid var(--sign-red);
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 18px;
    color: var(--ink);
  }

  .mini-sign.triangle {
    border-radius: 8px;
    transform: rotate(45deg);
    border-color: var(--sign-amber);
  }
  .mini-sign.triangle span { transform: rotate(-45deg); display:block; }

  .mini-sign.blue {
    border-color: var(--sign-blue);
    background: var(--sign-blue);
    color: white;
  }

  .start-screen h2 {
    font-size: 24px;
    color: var(--sign-blue);
    margin: 0 0 10px;
  }

  .start-screen p {
    color: #5b5648;
    font-size: 14.5px;
    line-height: 1.6;
    max-width: 480px;
    margin: 0 auto 26px;
  }

  .start-btn {
    background: var(--sign-blue);
    color: white;
    border: none;
    padding: 15px 36px;
    border-radius: 999px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.1s ease;
  }
  .start-btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--ink); }

  .exam-fact {
    margin-top: 26px;
    font-size: 12.5px;
    color: #5b5648;
    background: var(--paper-light);
    border: 2px dashed var(--line);
    border-radius: 12px;
    padding: 12px 16px;
    display: inline-block;
  }

  @media (max-width: 480px) {
    .q-text { font-size: 16.5px; }
    .brand h1 { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="app" id="app"></div>

<script>

const TOPIC_LABELS = {
  row:      { en: "Right of Way",       hu: "Elsőbbség" },
  signs:    { en: "Traffic Signs",      hu: "Táblák" },
  speed:    { en: "Speed & Distance",   hu: "Sebesség" },
  tech:     { en: "Moped & Gear",       hu: "Moped & Felszerelés" },
  peds:     { en: "Pedestrians/Cycles", hu: "Gyalogosok" },
  parking:  { en: "Stopping/Parking",   hu: "Megállás" },
  firstaid: { en: "First Aid",          hu: "Elsősegély" },
};

let state = {
  screen: "start",      // start | quiz | results
  lang: "en",
  topicFilter: "all",
  pool: [],
  index: 0,
  selected: null,
  answers: [],          // {correct: bool}
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildPool() {
  let pool = state.topicFilter === "all"
    ? QUESTIONS
    : QUESTIONS.filter(q => q.topic === state.topicFilter);
  return shuffle(pool).map(q => {
    // shuffle options but keep track of correct index (always index 0 in source data)
    const optIdx = shuffle(q[state.lang].options.map((_, i) => i));
    return { ...q, optOrder: optIdx };
  });
}

function startQuiz() {
  state.pool = buildPool();
  state.index = 0;
  state.selected = null;
  state.answers = [];
  state.screen = "quiz";
  render();
}

function selectOption(optPos) {
  if (state.selected !== null) return;
  state.selected = optPos;
  const q = state.pool[state.index];
  const correctPos = q.optOrder.indexOf(0); // index 0 in original options = correct
  const isCorrect = optPos === correctPos;
  state.answers.push({ correct: isCorrect });
  render();
}

function nextQuestion() {
  if (state.index + 1 >= state.pool.length) {
    state.screen = "results";
  } else {
    state.index++;
    state.selected = null;
  }
  render();
}

function restart(sameTopic) {
  if (!sameTopic) state.topicFilter = "all";
  state.screen = "start";
  render();
}

function setLang(l) { state.lang = l; render(); }
function setTopic(t) { state.topicFilter = t; render(); }

function renderTopicsChips() {
  const all = `<button class="chip ${state.topicFilter==='all'?'active':''}" onclick="setTopic('all')">${state.lang==='en'?'All Topics':'Minden témakör'}</button>`;
  const chips = Object.keys(TOPIC_LABELS).map(t =>
    `<button class="chip ${state.topicFilter===t?'active':''}" onclick="setTopic('${t}')">${TOPIC_LABELS[t][state.lang]}</button>`
  ).join("");
  return `<div class="topics">${all}${chips}</div>`;
}

function renderHeader() {
  return `
    <header>
      <div class="brand">
        <div class="brand-badge">AM<br>50</div>
        <div>
          <h1>${state.lang === 'en' ? 'KRESZ Practice' : 'KRESZ Gyakorló'}</h1>
          <p>${state.lang === 'en' ? 'Moped theory exam prep' : 'Moped elméleti vizsgára felkészítés'}</p>
        </div>
      </div>
      <div class="lang-toggle">
        <button class="${state.lang==='en'?'active':''}" onclick="setLang('en')">EN</button>
        <button class="${state.lang==='hu'?'active':''}" onclick="setLang('hu')">HU</button>
      </div>
    </header>
  `;
}

function renderStart() {
  const isEn = state.lang === 'en';
  return `
    ${renderHeader()}
    <div class="start-screen">
      <div class="hero-signs">
        <div class="mini-sign">30</div>
        <div class="mini-sign triangle"><span>!</span></div>
        <div class="mini-sign blue">→</div>
      </div>
      <h2>${isEn ? 'Ready to practice?' : 'Készen állsz a gyakorlásra?'}</h2>
      <p>${isEn
        ? 'Questions cover right of way, signs, speed and stopping distance, moped equipment, pedestrians, parking, and first aid — the real topics on the AM moped theory exam.'
        : 'A kérdések az elsőbbség, táblák, sebesség és fékút, moped felszerelés, gyalogosok, megállás és elsősegély témaköreit fedik le — ezek a valódi AM moped elméleti vizsga témái.'}</p>
      ${renderTopicsChips()}
      <br>
      <button class="start-btn" onclick="startQuiz()">${isEn ? 'Start practice' : 'Gyakorlás indítása'}</button>
      <div class="exam-fact">
        ${isEn
          ? '📋 Real exam: 25 questions, 35 points, 30 needed to pass.'
          : '📋 Valódi vizsga: 25 kérdés, 35 pont, 30 pont kell a sikerhez.'}
      </div>
    </div>
  `;
}

function renderQuiz() {
  const isEn = state.lang === 'en';
  const q = state.pool[state.index];
  const data = q[state.lang];
  const correctPos = q.optOrder.indexOf(0);

  const optionsHtml = q.optOrder.map((origIdx, pos) => {
    let cls = "";
    if (state.selected !== null) {
      if (pos === correctPos) cls = "correct";
      else if (pos === state.selected) cls = "wrong";
    }
    const letter = String.fromCharCode(65 + pos);
    return `
      <button class="option-btn ${cls}" ${state.selected !== null ? 'disabled' : ''} onclick="selectOption(${pos})">
        <span class="option-letter">${letter}</span>
        <span>${data.options[origIdx]}</span>
      </button>
    `;
  }).join("");

  const progressPct = Math.round((state.index / state.pool.length) * 100);

  return `
    ${renderHeader()}
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${progressPct}%"></div></div>
      <div class="progress-label">
        <span>${isEn ? 'Question' : 'Kérdés'} ${state.index + 1} / ${state.pool.length}</span>
        <span>${TOPIC_LABELS[q.topic][state.lang]}</span>
      </div>
    </div>
    <div class="sign-card">
      <div class="topic-tab">${TOPIC_LABELS[q.topic][state.lang]}</div>
      <div class="q-text">${data.q}</div>
      <div class="options">${optionsHtml}</div>
      ${state.selected !== null ? `
        <div class="explain-box"><strong>${isEn ? 'Why:' : 'Miért:'}</strong> ${data.explain}</div>
        <button class="next-btn" onclick="nextQuestion()">${state.index + 1 >= state.pool.length ? (isEn ? 'See results' : 'Eredmény megnézése') : (isEn ? 'Next question' : 'Következő kérdés')}</button>
      ` : ''}
    </div>
  `;
}

function renderResults() {
  const isEn = state.lang === 'en';
  const total = state.answers.length;
  const correct = state.answers.filter(a => a.correct).length;
  const pct = Math.round((correct / total) * 100);
  const passed = pct >= 80; // mirror real exam's ~86% bar loosely, but use 80% as a practice bar

  const r = 70, circumference = 2 * Math.PI * r;
  const dash = (pct / 100) * circumference;

  return `
    ${renderHeader()}
    <div class="results">
      <div class="score-ring">
        <svg width="160" height="160" viewBox="0 0 160 160">
          <circle cx="80" cy="80" r="${r}" fill="none" stroke="#C9C4B4" stroke-width="14"/>
          <circle cx="80" cy="80" r="${r}" fill="none" stroke="${passed ? '#1E7A3D' : '#C8102E'}"
            stroke-width="14" stroke-linecap="round"
            stroke-dasharray="${dash} ${circumference}"/>
        </svg>
        <div class="score-text">
          <div class="pts">${correct}/${total}</div>
          <div class="of">${pct}%</div>
        </div>
      </div>
      <div class="pass-banner ${passed ? 'pass' : 'fail'}">
        ${passed ? (isEn ? '✓ Solid score' : '✓ Szép eredmény') : (isEn ? 'Keep practicing' : 'Gyakorolj még')}
      </div>
      <h2>${isEn ? 'Practice round complete' : 'Gyakorló kör befejezve'}</h2>
      <p class="sub">${isEn
        ? 'Real exam needs 30 of 35 points (about 86%) to pass. Repeat any topic you missed.'
        : 'A valódi vizsgán 35 pontból 30 pont kell a sikerhez (kb. 86%). Ismételd át, amiben hibáztál.'}</p>
      <div>
        <button class="restart-btn" onclick="restart(true)">${isEn ? 'Practice again' : 'Gyakorlás újra'}</button>
        <button class="restart-btn outline" onclick="restart(false)">${isEn ? 'Choose new topic' : 'Új témakör választása'}</button>
      </div>
    </div>
  `;
}

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'start') app.innerHTML = renderStart();
  else if (state.screen === 'quiz') app.innerHTML = renderQuiz();
  else app.innerHTML = renderResults();
}

render();
</script>
